<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-label="Viewer membership">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161616"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8c878"/>
      <stop offset="0.5" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#b8902a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>
  <rect x="44" y="44" width="712" height="712" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.45"/>
  <rect x="58" y="58" width="684" height="684" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>

  <!-- emblem: a single framed work being viewed -->
  <g transform="translate(400 300)" fill="none" stroke="url(#gold)" stroke-width="6">
    <rect x="-90" y="-100" width="180" height="200" rx="4"/>
    <rect x="-66" y="-76" width="132" height="152" rx="2" stroke-width="3" opacity="0.5"/>
    <!-- minimal mountain/horizon motif inside the frame -->
    <path d="M-58 60 L-14 6 L14 36 L58 -16 L58 60 Z" stroke-width="4" opacity="0.7"/>
    <circle cx="34" cy="-50" r="14" stroke-width="4" opacity="0.7"/>
  </g>

  <text x="400" y="540" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="80" letter-spacing="4" fill="url(#gold)">Viewer</text>
  <text x="400" y="592" text-anchor="middle" font-family="Georgia, serif"
        font-size="26" letter-spacing="10" fill="#c9b885" opacity="0.8">MEMBERSHIP</text>

  <line x1="335" y1="628" x2="465" y2="628" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  <text x="400" y="676" text-anchor="middle" font-family="Georgia, serif"
        font-size="24" letter-spacing="2" fill="#9a8a64" opacity="0.85">5 works to begin</text>

  <text x="400" y="734" text-anchor="middle" font-family="Georgia, serif"
        font-size="20" letter-spacing="6" fill="#6f6346" opacity="0.7">TRIPLE A GALLERY</text>
</svg>
