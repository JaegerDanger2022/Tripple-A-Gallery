<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-label="Collector membership">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171717"/>
      <stop offset="1" stop-color="#0c0c0c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8c878"/>
      <stop offset="0.5" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#b8902a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#bg)"/>
  <rect x="40" y="40" width="720" height="720" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.55"/>
  <rect x="54" y="54" width="692" height="692" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.25"/>

  <!-- emblem: two overlapping frames = a small collection -->
  <g transform="translate(400 312)" fill="none" stroke="url(#gold)" stroke-width="6">
    <rect x="-118" y="-86" width="150" height="180" rx="4" opacity="0.45"/>
    <rect x="-58"  y="-110" width="150" height="180" rx="4"/>
    <circle cx="17" cy="-20" r="20" stroke-width="5" opacity="0.85"/>
  </g>

  <text x="400" y="540" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="76" letter-spacing="4" fill="url(#gold)">Collector</text>
  <text x="400" y="592" text-anchor="middle" font-family="Georgia, serif"
        font-size="26" letter-spacing="10" fill="#c9b885" opacity="0.8">MEMBERSHIP</text>

  <line x1="330" y1="628" x2="470" y2="628" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
  <text x="400" y="676" text-anchor="middle" font-family="Georgia, serif"
        font-size="24" letter-spacing="2" fill="#9a8a64" opacity="0.85">15 works unlocked</text>

  <text x="400" y="734" text-anchor="middle" font-family="Georgia, serif"
        font-size="20" letter-spacing="6" fill="#6f6346" opacity="0.7">TRIPLE A GALLERY</text>
</svg>
