runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyAD0aNqm6mJyJV40TFIz5LtipRIs6j0tyc
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: tripple-a-gallery.firebaseapp.com
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: tripple-a-gallery
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: tripple-a-gallery.firebasestorage.app
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "900118498830"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:900118498830:web:0140f0e162204ea328b65f
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-T5Y0DF8H2P

  # Public site origin — used to build Stripe redirect URLs. The server binds to
  # 0.0.0.0:8080 internally, so this must be the real public domain.
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://tripleagallery.com

  # ── Stripe ────────────────────────────────────────────────────────────────
  # One switch selects the credential set used at runtime: test | live.
  # Flip to "live" ONLY after the _LIVE price IDs + secrets below are filled in
  # and uncommented. The code falls back to un-suffixed vars if a _TEST/_LIVE
  # one is missing, so this stays backward-compatible.
  - variable: STRIPE_MODE
    value: test

  # Price IDs are not sensitive — safe as plaintext. Test-mode IDs:
  - variable: STRIPE_PRICE_TIER1_MONTHLY_TEST
    value: price_1TitVxCgMLH7jdHObFwhf2yB
  - variable: STRIPE_PRICE_TIER1_YEARLY_TEST
    value: price_1TitWLCgMLH7jdHOoBP5tB56
  - variable: STRIPE_PRICE_TIER2_MONTHLY_TEST
    value: price_1TitWtCgMLH7jdHOIqY4Hs5M
  - variable: STRIPE_PRICE_TIER2_YEARLY_TEST
    value: price_1TitXKCgMLH7jdHOcTuzNHTe
  # Live-mode price IDs — fill in + uncomment before going live:
  # - variable: STRIPE_PRICE_TIER1_MONTHLY_LIVE
  #   value: price_…
  # - variable: STRIPE_PRICE_TIER1_YEARLY_LIVE
  #   value: price_…
  # - variable: STRIPE_PRICE_TIER2_MONTHLY_LIVE
  #   value: price_…
  # - variable: STRIPE_PRICE_TIER2_YEARLY_LIVE
  #   value: price_…

  # Secrets — values live in Cloud Secret Manager, never in this file/repo.
  # The existing test secrets populate the _TEST variables:
  - variable: STRIPE_SECRET_KEY_TEST
    secret: STRIPE_SECRET_KEY
  - variable: STRIPE_WEBHOOK_SECRET_TEST
    secret: STRIPE_WEBHOOK_SECRET
  # Going live — create these secrets first, then uncomment:
  #   firebase apphosting:secrets:set STRIPE_SECRET_KEY_LIVE
  #   firebase apphosting:secrets:set STRIPE_WEBHOOK_SECRET_LIVE
  #   firebase apphosting:secrets:grantaccess STRIPE_SECRET_KEY_LIVE
  #   firebase apphosting:secrets:grantaccess STRIPE_WEBHOOK_SECRET_LIVE
  # - variable: STRIPE_SECRET_KEY_LIVE
  #   secret: STRIPE_SECRET_KEY_LIVE
  # - variable: STRIPE_WEBHOOK_SECRET_LIVE
  #   secret: STRIPE_WEBHOOK_SECRET_LIVE

  # ── Email (Resend) ─────────────────────────────────────────────────────────
  # API key is a secret. Senders/contact have code defaults (orders@, no-reply@,
  # info@ on tripleagallery.com) — override here only if you want different ones:
  #   MAIL_FROM_ORDERS, MAIL_FROM_MEMBERSHIP, MAIL_CONTACT
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY

  # Shared secret guarding the unverified-account purge endpoint
  # (/api/admin/purge-unverified). Create it before deploying:
  #   firebase apphosting:secrets:set PURGE_SECRET
  - variable: PURGE_SECRET
    secret: PURGE_SECRET
