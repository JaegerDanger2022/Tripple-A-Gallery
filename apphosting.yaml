runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 80

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyAD0aNqm6mJyJV40TFIz5LtipRIs6j0tyc
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: tripple-a-gallery.firebaseapp.com
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: tripple-a-gallery
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: tripple-a-gallery.firebasestorage.app
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "900118498830"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:900118498830:web:0140f0e162204ea328b65f
  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: G-T5Y0DF8H2P

  # Public site origin — used to build Stripe redirect URLs. The server binds to
  # 0.0.0.0:8080 internally, so this must be the real public domain.
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://tripleagallery.com

  # ── Stripe ────────────────────────────────────────────────────────────────
  # Price IDs are not sensitive — safe as plaintext. (Test-mode IDs for now.)
  - variable: STRIPE_PRICE_TIER1_MONTHLY
    value: price_1ThvrrCgMLH7jdHOF7Evlxzk
  - variable: STRIPE_PRICE_TIER1_YEARLY
    value: price_1Thvz6CgMLH7jdHO8qvgAgyl
  - variable: STRIPE_PRICE_TIER2_MONTHLY
    value: price_1ThvsbCgMLH7jdHOiHSbVmh4
  - variable: STRIPE_PRICE_TIER2_YEARLY
    value: price_1ThvuyCgMLH7jdHOfitx1AP1

  # Secrets — values live in Cloud Secret Manager, never in this file/repo.
  # Create them in the Firebase Console (or `firebase apphosting:secrets:set`),
  # then `firebase apphosting:secrets:grantaccess` so the backend can read them.
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET

  # ── Email (Resend) ─────────────────────────────────────────────────────────
  # API key is a secret. Senders/contact have code defaults (orders@, no-reply@,
  # info@ on tripleagallery.com) — override here only if you want different ones:
  #   MAIL_FROM_ORDERS, MAIL_FROM_MEMBERSHIP, MAIL_CONTACT
  - variable: RESEND_API_KEY
    secret: RESEND_API_KEY

  # Shared secret guarding the unverified-account purge endpoint
  # (/api/admin/purge-unverified). Create it before deploying:
  #   firebase apphosting:secrets:set PURGE_SECRET
  - variable: PURGE_SECRET
    secret: PURGE_SECRET
